spring:
  application:
    name: user-management
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/usermgmt}
    username: ${SPRING_DATASOURCE_USERNAME:usermgmt}
    password: ${SPRING_DATASOURCE_PASSWORD:usermgmt}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

---
spring:
  config:
    activate:
      on-profile: local
  jpa:
    show-sql: true
logging:
  level:
    org.hibernate.SQL: debug
    com.demo.usermgmt: debug
