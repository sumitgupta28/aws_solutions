services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-usermgmt}
      POSTGRES_USER: ${POSTGRES_USER:-usermgmt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usermgmt}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usermgmt} -d ${POSTGRES_DB:-usermgmt}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-usermgmt}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-usermgmt}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-usermgmt}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health | grep -q UP || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
