server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve the SPA, falling back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Local docker-compose convenience: proxy API calls to the backend service.
    # In the cloud (ECS/Fargate/EKS) the ALB / Ingress routes /api directly to
    # the backend, so requests never reach this block there.
    #
    # The upstream is referenced via a variable (with Docker's embedded DNS
    # resolver) so nginx defers name resolution to request time. That keeps the
    # SAME image bootable in the cloud, where the host "backend" does not exist
    # but /api never actually reaches this server.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8080;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
